query ShuttleStopDialogQuery ($stopID: String!, $date: Date!) {
    shuttle (input: {
        stops: [{ name: $stopID, limit: { order: null, destination: null } }],
        date: $date
    }) {
        stops {
            latitude
            longitude
            timetable {
                destination {
                    destination
                    entries {
                        time
                        weekday
                        route {
                            tag
                        }
                    }
                }
            }
        }
    }
}
