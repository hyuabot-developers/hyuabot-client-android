query SubwayRealtimePageQuery {
    subway (
        input: {
            keys: [
                { stationID: "K449", direction: ["up", "down"], weekdays: [] },
                { stationID: "K251", direction: ["up", "down"], weekdays: [] }
            ],
            limit: 4
        }) {
        stationID
        arrival {
            direction
            entries {
                minutes
                terminal { stationID, name }
                isRealtime
                location
                stops
                trainNumber
                isExpress
                isLast
            }
        }
    }
}
