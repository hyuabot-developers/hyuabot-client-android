query ShuttleTimetablePageQuery ($period: [String!]!, $stopID: String!, $destination: [String!]!) {
    shuttle (
        input: {
            stops: [{ name: $stopID, limit: { order: null, destination: null }, destinations: $destination }],
            periods: $period
        }
    ) {
        stops {
            timetable {
                order {
                    time
                    weekday
                    route {
                        tag
                    }
                    stops {
                        stop
                        time
                    }
                }
            }
        }
    }
}
