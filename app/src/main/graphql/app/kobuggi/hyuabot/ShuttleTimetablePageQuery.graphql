query ShuttleTimetablePageQuery ($period: [String!]!, $stopID: String!) {
    shuttle (
        input: {
            stops: [{ name: $stopID, limit: { order: null, destination: null } }],
            periods: $period
        }
    ) {
        stops {
            timetable {
                destination {
                    destination
                    entries {
                        time
                        weekday
                        route {
                            tag
                        }
                    }
                }
            }
        }
    }
}
