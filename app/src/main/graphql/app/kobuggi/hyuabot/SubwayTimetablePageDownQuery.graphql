query SubwayTimetablePageDownQuery($station: String!) {
    subway (
        input: {
            keys: [
                { stationID: $station, direction: ["down"], weekdays: ["weekdays", "weekends"] },
            ]
        }) {
        timetable {
            weekday
            direction
            time
            terminal { stationID, name }
        }
    }
}
